<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign in · Behind The Business</title>
    <meta name="robots" content="noindex" />
    <link rel="icon" type="image/png" href="/btb-favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script>
        window.tailwind.config = {
            theme: { extend: {
                fontFamily: { serif: ['Playfair Display', 'serif'], sans: ['Inter', 'sans-serif'] },
                colors: { brand: { sand: '#F5F3EE', moss: '#2F3E34', taupe: '#6B6A67', clay: '#B66A4A', divider: '#DEDAD4' }},
            }},
        };
    </script>
    <style>
        html { font-size: 17px; }
        body { font-family: 'Inter', sans-serif; background-color: #F5F3EE; color: #2F3E34; margin: 0; -webkit-font-smoothing: antialiased; }
        h1, h2, h3, h4, .serif { font-family: 'Playfair Display', serif; font-weight: 400; color: #2F3E34; }
        .grain::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 50; opacity: 0.03; background-image: url("https://grainy-gradients.vercel.app/noise.svg"); }
        .eyebrow { font-family: 'Inter', sans-serif; text-transform: uppercase; letter-spacing: 0.18em; font-size: 0.75rem; font-weight: 500; color: #B66A4A; }
        input:focus { outline: none; }
    </style>
</head>
<body class="grain min-h-screen flex flex-col">

<header class="w-full">
    <div class="max-w-6xl mx-auto px-6 md:px-10 py-6">
        <a href="/" class="inline-flex items-center gap-3">
            <img src="/btb-logo.png" alt="Behind The Business" width="40" height="40" />
            <span class="serif text-lg md:text-xl tracking-tight">Behind The Business</span>
        </a>
    </div>
</header>

<main class="flex-1 flex items-center justify-center px-6 py-12">
    <div class="w-full max-w-md">
        <p class="eyebrow mb-3 text-center" id="eyebrow">Welcome back</p>
        <h1 class="serif text-3xl md:text-4xl text-center mb-10" id="form-title">Sign in to your account</h1>

        <form id="auth-form" class="space-y-5">
            <div>
                <label for="email" class="block text-sm mb-2">Email</label>
                <input type="email" id="email" name="email" required placeholder="you@example.com"
                    class="w-full px-4 py-3 border border-brand-divider bg-white text-brand-moss focus:border-brand-clay transition" />
            </div>
            <div>
                <div class="flex items-center justify-between mb-2">
                    <label for="password" class="text-sm">Password</label>
                    <a href="#" id="forgot-link" class="text-xs text-brand-taupe hover:text-brand-clay transition">Forgot password?</a>
                </div>
                <input type="password" id="password" name="password" required placeholder="••••••••" minlength="6"
                    class="w-full px-4 py-3 border border-brand-divider bg-white text-brand-moss focus:border-brand-clay transition" />
            </div>

            <div id="error-msg" class="hidden text-sm text-red-700 bg-red-50 border border-red-200 px-4 py-3"></div>
            <div id="success-msg" class="hidden text-sm text-green-800 bg-green-50 border border-green-200 px-4 py-3"></div>

            <button type="submit" id="submit-btn"
                class="w-full bg-brand-moss text-brand-sand px-6 py-3 text-sm tracking-wide hover:bg-brand-clay transition disabled:opacity-50 disabled:cursor-not-allowed">
                Sign in
            </button>
        </form>

        <p class="text-center text-sm text-brand-taupe mt-8" id="toggle-wrap">
            Don't have an account? <a href="#" id="toggle-link" class="text-brand-moss hover:text-brand-clay transition underline underline-offset-2">Create one</a>
        </p>
    </div>
</main>

<footer class="w-full border-t border-brand-divider">
    <div class="max-w-6xl mx-auto px-6 md:px-10 py-6 flex flex-col md:flex-row md:items-center md:justify-between gap-3 text-xs text-brand-taupe">
        <p>© <span id="year"></span> Behind The Business.</p>
        <a href="mailto:tobey@behindthebusiness.net" class="hover:text-brand-clay transition">tobey@behindthebusiness.net</a>
    </div>
</footer>

<script>
    document.getElementById('year').textContent = new Date().getFullYear();

    const SUPABASE_URL = 'https://wjndqsqgfmbrakzcagei.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_MQ_1krNKxWTmdC4nEF4eBg_U4ZBYHha';
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Redirect away if already signed in
    (async () => {
        const { data: { session } } = await sb.auth.getSession();
        if (session) window.location.href = '/dashboard';
    })();

    let mode = 'signin'; // or 'signup'

    const form = document.getElementById('auth-form');
    const eyebrow = document.getElementById('eyebrow');
    const title = document.getElementById('form-title');
    const submitBtn = document.getElementById('submit-btn');
    const toggleWrap = document.getElementById('toggle-wrap');
    const errBox = document.getElementById('error-msg');
    const okBox = document.getElementById('success-msg');
    const forgotLink = document.getElementById('forgot-link');

    function applyMode(newMode) {
        mode = newMode;
        if (mode === 'signin') {
            eyebrow.textContent = 'Welcome back';
            title.textContent = 'Sign in to your account';
            submitBtn.textContent = 'Sign in';
            toggleWrap.innerHTML = `Don't have an account? <a href="#" id="toggle-link" class="text-brand-moss hover:text-brand-clay transition underline underline-offset-2">Create one</a>`;
        } else {
            eyebrow.textContent = 'Get started';
            title.textContent = 'Create your account';
            submitBtn.textContent = 'Sign up';
            toggleWrap.innerHTML = `Already have an account? <a href="#" id="toggle-link" class="text-brand-moss hover:text-brand-clay transition underline underline-offset-2">Sign in</a>`;
        }
        bindToggle();
        clearMessages();
    }

    function bindToggle() {
        document.getElementById('toggle-link').addEventListener('click', e => {
            e.preventDefault();
            applyMode(mode === 'signin' ? 'signup' : 'signin');
        });
    }

    function clearMessages() {
        errBox.classList.add('hidden'); errBox.textContent = '';
        okBox.classList.add('hidden'); okBox.textContent = '';
    }

    function showError(msg) {
        errBox.textContent = msg;
        errBox.classList.remove('hidden');
        okBox.classList.add('hidden');
    }

    function showSuccess(msg) {
        okBox.textContent = msg;
        okBox.classList.remove('hidden');
        errBox.classList.add('hidden');
    }

    bindToggle();

    form.addEventListener('submit', async e => {
        e.preventDefault();
        clearMessages();
        submitBtn.disabled = true;
        submitBtn.textContent = mode === 'signin' ? 'Signing in…' : 'Creating account…';

        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        try {
            if (mode === 'signin') {
                const { data, error } = await sb.auth.signInWithPassword({ email, password });
                if (error) { showError(error.message); return; }
                window.location.href = '/dashboard';
            } else {
                const { data, error } = await sb.auth.signUp({ email, password });
                if (error) { showError(error.message); return; }
                if (data.session) {
                    window.location.href = '/dashboard';
                } else {
                    showSuccess('Account created. Check your email for a confirmation link before signing in.');
                    applyMode('signin');
                }
            }
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = mode === 'signin' ? 'Sign in' : 'Sign up';
        }
    });

    forgotLink.addEventListener('click', async e => {
        e.preventDefault();
        const email = document.getElementById('email').value.trim();
        if (!email) { showError('Enter your email above first, then click Forgot password.'); return; }
        const { error } = await sb.auth.resetPasswordForEmail(email, {
            redirectTo: window.location.origin + '/login'
        });
        if (error) { showError(error.message); return; }
        showSuccess(`Password reset link sent to ${email}.`);
    });
</script>

</body>
</html>
