<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile · Behind The Business</title>
    <meta name="robots" content="noindex" />
    <link rel="icon" type="image/png" href="/btb-favicon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#2F3E34" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <link rel="apple-touch-icon" href="/btb-logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script>
        window.tailwind.config = {
            theme: { extend: {
                fontFamily: { serif: ['Playfair Display', 'serif'], sans: ['Inter', 'sans-serif'] },
                colors: { brand: { sand: '#F5F3EE', moss: '#2F3E34', taupe: '#6B6A67', clay: '#B66A4A', divider: '#DEDAD4' }},
            }},
        };
    </script>
    <style>
        html { font-size: 17px; }
        body { font-family: 'Inter', sans-serif; background-color: #F5F3EE; color: #2F3E34; margin: 0; -webkit-font-smoothing: antialiased; }
        h1, h2, h3, h4, .serif { font-family: 'Playfair Display', serif; font-weight: 400; color: #2F3E34; }
        .grain::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 50; opacity: 0.03; background-image: url("https://grainy-gradients.vercel.app/noise.svg"); }
        .eyebrow { font-family: 'Inter', sans-serif; text-transform: uppercase; letter-spacing: 0.18em; font-size: 0.75rem; font-weight: 500; color: #B66A4A; }
        input:focus { outline: none; }
        .btm-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #F5F3EE; border-top: 1px solid #DEDAD4; z-index: 55; display: flex; justify-content: space-around; padding: 0.5rem 0 calc(0.5rem + env(safe-area-inset-bottom)); }
        .btm-nav-item { display: flex; flex-direction: column; align-items: center; gap: 0.15rem; color: #6B6A67; font-size: 0.6rem; letter-spacing: 0.05em; text-decoration: none; padding: 0.4rem 1.2rem; transition: color 0.2s; }
        .btm-nav-item.active { color: #2F3E34; }
        @media (min-width: 1024px) { .btm-nav { display: none; } }
        .avatar { width: 36px; height: 36px; border-radius: 50%; background-color: #B66A4A; color: #F5F3EE; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 600; letter-spacing: 0.02em; flex-shrink: 0; }
    </style>
</head>
<body class="grain min-h-screen flex flex-col pb-16 lg:pb-0">

<header class="w-full sticky top-0 bg-brand-sand z-[55]">
    <div class="max-w-6xl mx-auto px-6 md:px-10 py-6 flex items-center justify-between">
        <a href="/" class="flex items-center gap-3">
            <img src="/btb-logo.png" alt="Behind The Business" width="40" height="40" />
            <span class="serif text-lg md:text-xl tracking-tight">Behind The Business</span>
        </a>
        <div class="flex items-center gap-4">
            <a href="/dashboard" class="text-sm text-brand-taupe hover:text-brand-moss transition">← Dashboard</a>
            <a href="#" id="signout-link" class="hidden md:inline-block text-sm text-brand-taupe hover:text-brand-clay transition">Sign out</a>
            <span id="user-avatar" class="avatar"></span>
        </div>
    </div>
</header>

<main class="flex-1 flex items-center justify-center px-6 py-12">
    <div class="w-full max-w-md">
        <p class="eyebrow mb-3 text-center">Your profile</p>
        <h1 class="serif text-3xl md:text-4xl text-center mb-10">Edit your details</h1>

        <form id="profile-form" class="space-y-5">
            <div>
                <label for="full-name" class="block text-sm mb-2">Full name</label>
                <input type="text" id="full-name" name="full_name" required placeholder="Your full name"
                    class="w-full px-4 py-3 border border-brand-divider bg-white text-brand-moss focus:border-brand-clay transition" />
                <p class="text-xs text-brand-taupe mt-1.5">This will appear on your certificates.</p>
            </div>
            <div>
                <label for="email" class="block text-sm mb-2">Email</label>
                <input type="email" id="email" disabled
                    class="w-full px-4 py-3 border border-brand-divider bg-gray-50 text-brand-taupe cursor-not-allowed" />
            </div>

            <div id="error-msg" class="hidden text-sm text-red-700 bg-red-50 border border-red-200 px-4 py-3"></div>
            <div id="success-msg" class="hidden text-sm text-green-800 bg-green-50 border border-green-200 px-4 py-3"></div>

            <button type="submit" id="submit-btn"
                class="w-full bg-brand-moss text-brand-sand px-6 py-3 text-sm tracking-wide hover:bg-brand-clay transition disabled:opacity-50 disabled:cursor-not-allowed">
                Save Changes
            </button>
        </form>
    </div>
</main>

<nav class="btm-nav lg:hidden">
    <a href="/" class="btm-nav-item">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 12l9-8 9 8"/><path d="M5 10v9a1 1 0 001 1h3a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1h3a1 1 0 001-1v-9"/></svg>
        <span>Home</span>
    </a>
    <a href="/dashboard" class="btm-nav-item">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        <span>Courses</span>
    </a>
    <a href="/profile" class="btm-nav-item active">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="8" r="4"/><path d="M5 20c0-3.3 3.1-6 7-6s7 2.7 7 6"/></svg>
        <span>Profile</span>
    </a>
</nav>

<footer class="w-full border-t border-brand-divider hidden lg:block">
    <div class="max-w-6xl mx-auto px-6 md:px-10 py-6 flex flex-col md:flex-row md:items-center md:justify-between gap-3 text-xs text-brand-taupe">
        <p>&copy; <span id="year"></span> Behind The Business.</p>
        <a href="mailto:tobey@behindthebusiness.net" class="hover:text-brand-clay transition">tobey@behindthebusiness.net</a>
    </div>
</footer>

<script>
    document.getElementById('year').textContent = new Date().getFullYear();
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');

    const SUPABASE_URL = 'https://wjndqsqgfmbrakzcagei.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_MQ_1krNKxWTmdC4nEF4eBg_U4ZBYHha';
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const errBox = document.getElementById('error-msg');
    const okBox = document.getElementById('success-msg');

    function showError(msg) {
        errBox.textContent = msg; errBox.classList.remove('hidden');
        okBox.classList.add('hidden');
    }
    function showSuccess(msg) {
        okBox.textContent = msg; okBox.classList.remove('hidden');
        errBox.classList.add('hidden');
    }

    (async () => {
        const { data: { session } } = await sb.auth.getSession();
        if (!session) { window.location.href = '/login'; return; }

        const userEmail = session.user.email;
        document.getElementById('email').value = userEmail;

        const { data: profile } = await sb
            .from('profiles')
            .select('full_name')
            .eq('id', session.user.id)
            .maybeSingle();

        if (profile && profile.full_name) {
            document.getElementById('full-name').value = profile.full_name;
        }

        function setAvatar() {
            const name = document.getElementById('full-name').value.trim();
            const initials = name
                ? name.split(' ').filter(Boolean).map(w => w[0]).slice(0, 2).join('').toUpperCase()
                : userEmail.substring(0, 2).toUpperCase();
            document.getElementById('user-avatar').textContent = initials;
        }
        setAvatar();
        document.getElementById('full-name').addEventListener('input', setAvatar);
    })();

    document.getElementById('profile-form').addEventListener('submit', async e => {
        e.preventDefault();
        const btn = document.getElementById('submit-btn');
        btn.disabled = true;
        btn.textContent = 'Saving…';
        errBox.classList.add('hidden');
        okBox.classList.add('hidden');

        const { data: { session } } = await sb.auth.getSession();
        if (!session) { window.location.href = '/login'; return; }

        const fullName = document.getElementById('full-name').value.trim();
        if (!fullName) { showError('Please enter your name.'); btn.disabled = false; btn.textContent = 'Save Changes'; return; }

        const { error } = await sb
            .from('profiles')
            .upsert({ id: session.user.id, full_name: fullName }, { onConflict: 'id' });

        if (error) {
            showError('Could not save: ' + error.message);
        } else {
            showSuccess('Profile saved. Your name will appear on certificates.');
        }

        btn.disabled = false;
        btn.textContent = 'Save Changes';
    });

    document.getElementById('signout-link').addEventListener('click', async e => {
        e.preventDefault();
        await sb.auth.signOut();
        window.location.href = '/';
    });
</script>

</body>
</html>
